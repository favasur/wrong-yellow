# Gradle runtime options
org.gradle.daemon = true
org.gradle.jvmargs = -Xmx3G
org.gradle.parallel = true
org.gradle.caching = true

# Java / Hytale options
java_version = 25
hytale_version = 0.+

# Mod identity
group = com.favasur
manifest_group = FavaSur
mod_name = WrongYellow
main_class = com.favasur.wrongyellow.FlickerPlugin
mod_author = FavaSur
mod_id = wrongyellow_flicker
mod_license = MIT
mod_description = Flickering light effects for White Build Lightsource blocks in the Wrong Yellow mod pack.
mod_url = https://github.com/wrongyellow

# Version
version = 0.1.0--0.5.6

# Manifest / packaging options
includes_pack = true
disabled_by_default = false
patchline = release
server_version = 0.5.3
manifestServerVersion = >=0.5.3 <0.6.0
manifest_dependencies = Hytale:AssetModule=*
manifest_opt_dependencies =
curseforgeID =
injectServerJavadocsIntoSources = true
generateAssetsBinary = false

# Local Hytale installation path for SDK resolution
hytaleHomeOverride = C:/Users/User X/AppData/Roaming/Hytale/install/release/package/game/latest/Assets.zip
